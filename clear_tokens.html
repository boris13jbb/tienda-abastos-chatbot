<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpiar tokens - Chatbot Tienda de Abastos</title>
    <link href="/static/css/styles.css" rel="stylesheet">
    <style>
        .clear-page {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, .1);
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="clear-page">
        <h1>Limpiar sesión local</h1>
        <p id="message">Esta página elimina el token y los datos de usuario guardados en el navegador.</p>
        <button class="btn btn-primary" type="button" id="clearBtn">Limpiar tokens ahora</button>
        <p class="mt-3"><a href="/">Volver al inicio</a></p>
    </div>
    <script>
        function clearTokens() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            document.getElementById('message').textContent = 'Tokens eliminados correctamente. Redirigiendo al inicio...';
            setTimeout(() => { window.location.href = '/'; }, 1500);
        }
        document.getElementById('clearBtn').addEventListener('click', clearTokens);
        clearTokens();
    </script>
</body>

</html>
