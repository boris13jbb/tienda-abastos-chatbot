<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR - Chatbot Tienda de Abastos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <style>
        .qr-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

        .qr-card {
            background: #fff;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, .1);
            margin-top: 1rem;
        }

        .product-card {
            margin-top: 1rem;
            padding: 1rem;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .product-card h3 {
            margin-bottom: .5rem;
            color: #2c3e50;
        }

        .product-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: .5rem;
            margin-top: .75rem;
        }

        .product-meta span {
            background: #fff;
            padding: .5rem;
            border-radius: 6px;
            font-size: .9rem;
        }

        .error-box {
            color: #721c24;
            background: #f8d7da;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="qr-page">
        <header class="header">
            <div class="logo"><i class="fas fa-qrcode"></i><span>Escáner QR</span></div>
            <nav class="auth-buttons app-nav">
                <a href="/" class="btn btn-outline"><i class="fas fa-home"></i> Inicio</a>
                <a href="/status" class="btn btn-outline"><i class="fas fa-heartbeat"></i> Monitor</a>
            </nav>
        </header>

        <div class="qr-card">
            <h2>Buscar producto por código</h2>
            <p>Escanea con pistola lectora, pega el código QR o escríbelo manualmente.</p>
            <div class="form-group">
                <label for="qrInput">Código QR / Barras</label>
                <input type="text" id="qrInput" placeholder="Ej: 12345, código QR o nombre de producto" autofocus>
            </div>
            <button class="btn btn-primary" type="button" id="scanBtn">Buscar producto</button>
            <div id="qrResult"></div>
        </div>
    </div>

    <script>
        const qrInput = document.getElementById('qrInput');
        const scanBtn = document.getElementById('scanBtn');
        const qrResult = document.getElementById('qrResult');

        function renderProduct(product) {
            return `
                <div class="product-card">
                    <h3>${product.nombre || product.Nombre || 'Producto'}</h3>
                    <p>${product.descripcion || product.Descripcion || 'Sin descripción'}</p>
                    <div class="product-meta">
                        <span><strong>Código:</strong> ${product.codigo || product.Codigo || product.ID || '—'}</span>
                        <span><strong>Precio:</strong> $${Number(product.precio ?? product.Precio ?? 0).toFixed(2)}</span>
                        <span><strong>Stock:</strong> ${product.stock ?? product.Stock ?? '—'}</span>
                        <span><strong>Categoría:</strong> ${product.categoria || product.Categoria || '—'}</span>
                    </div>
                </div>
            `;
        }

        function renderResults(data) {
            if (!data.success) {
                qrResult.innerHTML = `<div class="error-box">${data.message || 'No se encontró el producto'}</div>`;
                return;
            }

            let html = `<p><strong>${data.message || 'Producto encontrado'}</strong></p>`;
            if (data.product_info) {
                html += renderProduct(data.product_info);
            }
            if (Array.isArray(data.search_results) && data.search_results.length > 0) {
                html += '<h4>Otros resultados</h4>';
                data.search_results.slice(0, 5).forEach((item) => {
                    html += renderProduct(item);
                });
            }
            qrResult.innerHTML = html;
        }

        async function scanCode() {
            const code = qrInput.value.trim();
            if (!code) {
                alert('Ingresa un código');
                return;
            }
            qrResult.innerHTML = '<p>Buscando...</p>';
            try {
                const headers = { 'Content-Type': 'application/json' };
                const token = localStorage.getItem('authToken');
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const response = await fetch('/api/qr/scan', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ qr_code: code })
                });
                const data = await response.json();
                if (!response.ok) {
                    qrResult.innerHTML = `<div class="error-box">${data.detail || 'Error en la búsqueda'}</div>`;
                    return;
                }
                renderResults(data);
            } catch (error) {
                qrResult.innerHTML = `<div class="error-box">Error de conexión: ${error.message}</div>`;
            }
        }

        scanBtn.addEventListener('click', scanCode);
        qrInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') scanCode();
        });
    </script>
</body>

</html>
