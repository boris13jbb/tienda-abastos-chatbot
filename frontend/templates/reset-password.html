<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Chatbot Tienda de Abastos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>Chatbot Tienda de Abastos</span>
            </div>
            <div class="auth-buttons">
                <a href="/" class="btn btn-outline">
                    <i class="fas fa-home"></i>
                    <span>Volver al Inicio</span>
                </a>
            </div>
        </header>

        <main class="main flex-center">
            <div class="reset-password-container">
                <h1>Restablecer Contraseña</h1>
                <p>Ingresa tu nueva contraseña para restablecerla.</p>

                <form id="resetPasswordForm" class="password-reset-form">
                    <input type="hidden" id="resetToken" name="token">

                    <div class="form-group">
                        <label for="newPassword">Nueva Contraseña</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Restablecer Contraseña</button>
                </form>

                <div class="text-center mt-3">
                    <a href="/" class="text-link">Volver a la página principal</a>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/reset-password.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const tokenInput = document.getElementById('resetToken');
            if (token && tokenInput) {
                tokenInput.value = token;
            }
        });
    </script>
</body>

</html>
